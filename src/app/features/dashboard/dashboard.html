<div class="shell">
  <app-dashboard-sidebar [(mobileOpen)]="mobileSidebarOpen"></app-dashboard-sidebar>

  <div class="shell__main">
    <header class="shell__header">
      <button type="button" class="shell__menu-toggle" (click)="toggleMobileSidebar()" aria-label="Toggle menu">
        ☰
      </button>
      <div class="shell__header-spacer"></div>
      <div class="shell__header-actions">
        <button type="button" class="shell__bell" aria-label="Notifications">
          🔔
          @if (notificationCount() > 0) {
            <span class="shell__badge">{{ notificationCount() }}</span>
          }
        </button>
        <div class="shell__user">
          <div class="shell__user-avatar">
            @if (profileImageUrl()) {
              <img [src]="profileImageUrl()!" [alt]="displayName()" class="shell__user-avatar-img" />
            } @else {
              {{ displayName().charAt(0) }}
            }
          </div>
          <div class="shell__user-text">
            <span class="shell__user-name">{{ displayName() }}</span>
            <span class="shell__user-code">{{ employeeCode() }}</span>
          </div>
          <span class="shell__chev" aria-hidden="true">▾</span>
        </div>
        <button type="button" class="shell__logout" (click)="logout()">Sign out</button>
      </div>
    </header>

    <div class="shell__content">
      @if (hasSubmenuRoute()) {
        <router-outlet></router-outlet>
      } @else {
        @if (isSuperAdmin()) {
          <app-superadmin-dashboard
            [vm]="superVm()"
            [loading]="loading()"
            [selectedYear]="year()"
            [compareWith]="compareWith()"
            (yearChange)="onYearChange($event)"
            (compareChange)="onCompareChange($event)"
          />
        } @else {
          <app-user-dashboard [profile]="profile()" [loading]="loading()" />
        }
      }
    </div>
  </div>
</div>
