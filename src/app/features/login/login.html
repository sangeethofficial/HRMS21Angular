<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-area">
        <div class="logo-symbol">K</div>
        <h1>Kryptos</h1>
      </div>
      <p>Log in to your HRMS account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-field">
        <label for="username">Username, Email or Emp Code</label>
        <div class="input-group">
          <input 
            type="text" 
            id="username" 
            formControlName="userNameOrEmailOrEmpCode" 
            placeholder="e.g. john.doe"
            [class.error]="loginForm.get('userNameOrEmailOrEmpCode')?.invalid && loginForm.get('userNameOrEmailOrEmpCode')?.touched"
          >
          <span class="focus-border"></span>
        </div>
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <div class="input-group">
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <span class="focus-border"></span>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="error-banner">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="submit-btn" [disabled]="isLoading() || loginForm.invalid">
        @if (isLoading()) {
          <span class="loader"></span>
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <div class="login-footer">
      <a href="#">Forgot password?</a>
    </div>
  </div>
</div>
